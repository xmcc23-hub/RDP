<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 320">
  <defs>
    <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D5016;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#52B788;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5016;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main pipe body -->
  <rect x="4" y="0" width="44" height="320" fill="url(#pipeGradient)" stroke="#1B4D0E" stroke-width="2"/>
  <!-- Pipe cap (top) -->
  <rect x="0" y="295" width="52" height="12" fill="#2D5016" stroke="#1B4D0E" stroke-width="1"/>
  <!-- Highlight for 3D effect -->
  <rect x="6" y="10" width="40" height="4" fill="#7FD899" opacity="0.5"/>
  <!-- Shadow -->
  <rect x="4" y="15" width="4" height="300" fill="#1B4D0E" opacity="0.3"/>
</svg>